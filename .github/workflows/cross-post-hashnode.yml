name: Cross-post to Hashnode

on:
  push:
    branches: [main]
    paths: ['content/post/**/index.en.md']
  workflow_dispatch:

jobs:
  cross-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Cross-post new articles to Hashnode
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          SITE_URL: https://recca0120.github.io
        run: |
          changed=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'content/post/*/index.en.md' || true)
          if [ -z "$changed" ]; then
            echo "No new English articles found."
            exit 0
          fi
          echo "$changed" > /tmp/changed_files.txt

          python3 << 'SCRIPT'
          import os, json, re, time, urllib.request, urllib.error
          from datetime import datetime, timezone

          API_KEY = os.environ["HASHNODE_API_KEY"]
          PUB_ID = os.environ["HASHNODE_PUBLICATION_ID"]
          SITE_URL = os.environ["SITE_URL"]
          GQL_URL = "https://gql.hashnode.com"
          HEADERS = {"Content-Type": "application/json", "Authorization": API_KEY, "User-Agent": "recca0120-blog-crosspost/1.0"}

          def gql(query, variables=None):
              body = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(GQL_URL, data=body, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read().decode())

          def parse_frontmatter(filepath):
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              parts = content.split("---", 2)
              if len(parts) < 3:
                  return None, content
              fm_text = parts[1]
              body = parts[2].strip()
              fm = {}
              current_key = None
              list_values = []
              for line in fm_text.strip().split("\n"):
                  if line.startswith("- ") and current_key:
                      list_values.append(line[2:].strip().strip("'\""))
                  else:
                      if current_key and list_values:
                          fm[current_key] = list_values
                          list_values = []
                      if ":" in line:
                          key, val = line.split(":", 1)
                          key = key.strip()
                          val = val.strip().strip("'\"")
                          current_key = key
                          if val:
                              fm[key] = val
                          else:
                              list_values = []
              if current_key and list_values:
                  fm[current_key] = list_values
              return fm, body

          # Fetch existing canonical URLs
          existing_urls = set()
          query_posts = """
          query($host: String!, $after: String) {
            publication(host: $host) {
              posts(first: 50, after: $after) {
                edges { node { originalArticleURL } cursor }
                pageInfo { hasNextPage endCursor }
              }
            }
          }
          """
          after = None
          while True:
              _, resp = gql(query_posts, {"host": "recca0120.hashnode.dev", "after": after})
              posts = resp.get("data", {}).get("publication", {}).get("posts", {})
              for edge in posts.get("edges", []):
                  u = edge["node"].get("originalArticleURL") or ""
                  if u:
                      existing_urls.add(u)
              if not posts.get("pageInfo", {}).get("hasNextPage"):
                  break
              after = posts["pageInfo"]["endCursor"]

          with open("/tmp/changed_files.txt") as f:
              files = [l.strip() for l in f if l.strip()]

          now = datetime.now(timezone.utc)

          publish_mutation = """
          mutation PublishPost($input: PublishPostInput!) {
            publishPost(input: $input) {
              post { id url }
            }
          }
          """

          for filepath in files:
              fm, body = parse_frontmatter(filepath)
              if not fm:
                  continue

              title = fm.get("title", "")
              slug = fm.get("slug", "")
              date_str = fm.get("date", "")
              description = fm.get("description", "")
              draft = fm.get("draft", "false")
              tags = fm.get("tags", [])
              if isinstance(tags, str):
                  tags = [tags]

              if draft == "true":
                  print(f"SKIP (draft): {title}")
                  continue

              try:
                  dt = datetime.fromisoformat(date_str)
                  if dt > now:
                      print(f"SKIP (future): {title}")
                      continue
                  year, month, day = dt.strftime("%Y"), dt.strftime("%m"), dt.strftime("%d")
              except:
                  print(f"SKIP (bad date): {title}")
                  continue

              # Clean slug for Hashnode: lowercase, alphanumeric and dashes only, max 250 chars
              hashnode_slug = re.sub(r'[^a-z0-9-]', '-', slug.lower())
              hashnode_slug = re.sub(r'-+', '-', hashnode_slug).strip('-')[:250]

              canonical_url = f"{SITE_URL}/en/{year}/{month}/{day}/{slug}/"

              if canonical_url in existing_urls:
                  print(f"SKIP (exists): {title}")
                  continue

              hashnode_tags = []
              for t in tags[:5]:
                  tag_slug = re.sub(r'[^a-z0-9-]', '', t.lower().replace(' ', '-'))
                  if tag_slug:
                      hashnode_tags.append({"slug": tag_slug, "name": t})

              md = f"*Originally published at [recca0120.github.io]({canonical_url})*\n\n{body}"

              variables = {
                  "input": {
                      "title": title,
                      "contentMarkdown": md,
                      "publicationId": PUB_ID,
                      "originalArticleURL": canonical_url,
                      "slug": hashnode_slug,
                      "tags": hashnode_tags,
                      "metaTags": {"description": description},
                  }
              }

              status, resp = gql(publish_mutation, variables)
              post_data = resp.get("data", {}).get("publishPost", {}).get("post", {})
              errors = resp.get("errors", [])

              if post_data and post_data.get("url"):
                  print(f"OK: {title} -> {post_data['url']}")
              else:
                  err_msg = errors[0]["message"] if errors else str(resp)[:200]
                  print(f"FAIL ({status}): {title} - {err_msg}")

              time.sleep(5)
          SCRIPT
