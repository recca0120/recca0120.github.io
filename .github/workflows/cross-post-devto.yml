name: Cross-post to dev.to

on:
  push:
    branches: [main]
    paths: ['content/post/**/index.en.md']
  workflow_dispatch:

jobs:
  cross-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Cross-post new articles to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          SITE_URL: https://recca0120.github.io
        run: |
          # 找出新增或修改的英文文章
          changed=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'content/post/*/index.en.md' || true)
          if [ -z "$changed" ]; then
            echo "No new English articles found."
            exit 0
          fi
          echo "$changed" > /tmp/changed_files.txt

          python3 << 'SCRIPT'
          import os, json, re, time, urllib.request, urllib.error
          from datetime import datetime, timezone

          API_KEY = os.environ["DEVTO_API_KEY"]
          SITE_URL = os.environ["SITE_URL"]
          HEADERS = {"api-key": API_KEY, "Content-Type": "application/json", "User-Agent": "recca0120-blog-crosspost/1.0"}

          def api_get(url):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def api_post(url, data):
              body = json.dumps(data).encode()
              req = urllib.request.Request(url, data=body, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          def parse_frontmatter(filepath):
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              parts = content.split("---", 2)
              if len(parts) < 3:
                  return None, content
              fm_text = parts[1]
              body = parts[2].strip()
              fm = {}
              current_key = None
              list_values = []
              for line in fm_text.strip().split("\n"):
                  if line.startswith("- ") and current_key:
                      list_values.append(line[2:].strip().strip("'\""))
                  else:
                      if current_key and list_values:
                          fm[current_key] = list_values
                          list_values = []
                      if ":" in line:
                          key, val = line.split(":", 1)
                          key = key.strip()
                          val = val.strip().strip("'\"")
                          current_key = key
                          if val:
                              fm[key] = val
                          else:
                              list_values = []
              if current_key and list_values:
                  fm[current_key] = list_values
              return fm, body

          # 讀取變更檔案清單
          with open("/tmp/changed_files.txt") as f:
              files = [l.strip() for l in f if l.strip()]

          now = datetime.now(timezone.utc)

          # 抓已有的 canonical URLs
          existing_urls = set()
          page = 1
          while True:
              try:
                  articles = api_get(f"https://dev.to/api/articles/me?per_page=100&page={page}")
                  if not isinstance(articles, list) or len(articles) == 0:
                      break
                  for a in articles:
                      u = a.get("canonical_url") or ""
                      if u:
                          existing_urls.add(u)
                  page += 1
              except:
                  break

          for filepath in files:
              fm, body = parse_frontmatter(filepath)
              if not fm:
                  continue

              title = fm.get("title", "")
              slug = fm.get("slug", "")
              date_str = fm.get("date", "")
              description = fm.get("description", "")
              draft = fm.get("draft", "false")
              tags = fm.get("tags", [])
              if isinstance(tags, str):
                  tags = [tags]

              if draft == "true":
                  print(f"SKIP (draft): {title}")
                  continue

              try:
                  dt = datetime.fromisoformat(date_str)
                  if dt > now:
                      print(f"SKIP (future): {title}")
                      continue
                  year, month, day = dt.strftime("%Y"), dt.strftime("%m"), dt.strftime("%d")
              except:
                  print(f"SKIP (bad date): {title}")
                  continue

              canonical_url = f"{SITE_URL}/en/{year}/{month}/{day}/{slug}/"

              if canonical_url in existing_urls:
                  print(f"SKIP (exists): {title}")
                  continue

              devto_tags = []
              for t in tags[:4]:
                  tag = re.sub(r'[^a-z0-9]', '', t.lower())
                  if tag:
                      devto_tags.append(tag)

              md = f"*Originally published at [recca0120.github.io]({canonical_url})*\n\n{body}"

              payload = {
                  "article": {
                      "title": title,
                      "body_markdown": md,
                      "published": True,
                      "canonical_url": canonical_url,
                      "tags": devto_tags,
                      "description": description,
                  }
              }

              status, resp = api_post("https://dev.to/api/articles", payload)
              if status == 201:
                  url = resp.get("url", "") if isinstance(resp, dict) else ""
                  print(f"OK: {title} -> {url}")
              else:
                  print(f"FAIL ({status}): {title} - {str(resp)[:200]}")

              time.sleep(4)
          SCRIPT
