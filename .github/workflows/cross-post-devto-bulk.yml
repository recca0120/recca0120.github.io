name: Bulk cross-post to dev.to

on:
  workflow_dispatch:

jobs:
  bulk-cross-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bulk cross-post all English articles to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          SITE_URL: https://recca0120.github.io
        run: |
          python3 << 'SCRIPT'
          import os, json, glob, time, re, urllib.request, urllib.error
          from datetime import datetime, timezone

          API_KEY = os.environ["DEVTO_API_KEY"]
          SITE_URL = os.environ["SITE_URL"]
          HEADERS = {"api-key": API_KEY, "Content-Type": "application/json", "User-Agent": "recca0120-blog-crosspost/1.0"}

          def api_get(url):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def api_post(url, data):
              body = json.dumps(data).encode()
              req = urllib.request.Request(url, data=body, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          # 驗證 API key
          print("Verifying API key...")
          try:
              me = api_get("https://dev.to/api/users/me")
              print(f"Authenticated as: {me.get('username', 'unknown')}")
          except Exception as e:
              print(f"ERROR: API key invalid or network error: {e}")
              exit(1)

          # 抓已有文章的 canonical URLs
          print("Fetching existing articles from dev.to...")
          existing_urls = set()
          page = 1
          while True:
              try:
                  articles = api_get(f"https://dev.to/api/articles/me?per_page=100&page={page}")
                  if not isinstance(articles, list) or len(articles) == 0:
                      break
                  for a in articles:
                      url = a.get("canonical_url") or ""
                      if url:
                          existing_urls.add(url)
                  page += 1
              except Exception as e:
                  print(f"Warning: failed to fetch page {page}: {e}")
                  break
          print(f"Found {len(existing_urls)} existing articles on dev.to")

          # 解析 frontmatter
          def parse_frontmatter(filepath):
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              parts = content.split("---", 2)
              if len(parts) < 3:
                  return None, content
              fm_text = parts[1]
              body = parts[2].strip()
              fm = {}
              current_key = None
              list_values = []
              for line in fm_text.strip().split("\n"):
                  if line.startswith("- ") and current_key:
                      list_values.append(line[2:].strip().strip("'\""))
                  else:
                      if current_key and list_values:
                          fm[current_key] = list_values
                          list_values = []
                      if ":" in line:
                          key, val = line.split(":", 1)
                          key = key.strip()
                          val = val.strip().strip("'\"")
                          current_key = key
                          if val:
                              fm[key] = val
                          else:
                              list_values = []
              if current_key and list_values:
                  fm[current_key] = list_values
              return fm, body

          now = datetime.now(timezone.utc)
          published = 0
          skipped = 0
          failed = 0

          files = sorted(glob.glob("content/post/*/index.en.md"))
          print(f"Found {len(files)} English articles\n")

          for filepath in files:
              fm, body = parse_frontmatter(filepath)
              if not fm:
                  print(f"SKIP (no frontmatter): {filepath}")
                  skipped += 1
                  continue

              title = fm.get("title", "")
              slug = fm.get("slug", "")
              date_str = fm.get("date", "")
              description = fm.get("description", "")
              draft = fm.get("draft", "false")
              tags = fm.get("tags", [])
              if isinstance(tags, str):
                  tags = [tags]

              if draft == "true":
                  print(f"SKIP (draft): {title}")
                  skipped += 1
                  continue

              # 解析日期
              try:
                  dt = datetime.fromisoformat(date_str)
                  if dt > now:
                      print(f"SKIP (future): {title}")
                      skipped += 1
                      continue
                  year = dt.strftime("%Y")
                  month = dt.strftime("%m")
                  day = dt.strftime("%d")
              except Exception:
                  print(f"SKIP (bad date): {title} ({date_str})")
                  skipped += 1
                  continue

              canonical_url = f"{SITE_URL}/en/{year}/{month}/{day}/{slug}/"

              if canonical_url in existing_urls:
                  print(f"SKIP (exists): {title}")
                  skipped += 1
                  continue

              # dev.to tags: 最多 4 個，小寫，只允許英數和 dash
              devto_tags = []
              for t in tags[:4]:
                  tag = re.sub(r'[^a-z0-9]', '', t.lower())
                  if tag:
                      devto_tags.append(tag)

              md = f"*Originally published at [recca0120.github.io]({canonical_url})*\n\n{body}"

              payload = {
                  "article": {
                      "title": title,
                      "body_markdown": md,
                      "published": True,
                      "canonical_url": canonical_url,
                      "tags": devto_tags,
                      "description": description,
                  }
              }

              status, resp = api_post("https://dev.to/api/articles", payload)

              if status == 201:
                  url = resp.get("url", "") if isinstance(resp, dict) else ""
                  print(f"OK: {title} -> {url}")
                  published += 1
                  existing_urls.add(canonical_url)
              else:
                  print(f"FAIL ({status}): {title}")
                  print(f"  {str(resp)[:200]}")
                  failed += 1

              time.sleep(4)

          print(f"\n=== Summary ===")
          print(f"Published: {published}")
          print(f"Skipped:   {skipped}")
          print(f"Failed:    {failed}")

          if failed > 0:
              exit(1)
          SCRIPT
